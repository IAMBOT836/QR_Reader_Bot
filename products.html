<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | QR-Based User Manual Bot</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

    <!-- Navigation -->

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="how-it-works.html">How It Works</a></li>
            <li><a href="user-benefits.html">User Benefits</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Product Section -->

    <section class="products-container">

        <h1>Create Product Manual QR</h1>

        <p>
            Enter your product information and generate
            a QR code instantly.
        </p>

        <div class="product-form">

            <input
                type="text"
                id="productName"
                placeholder="Product Name">

            <input
                type="text"
                id="companyName"
                placeholder="Company Name">

            <input
                type="text"
                id="productCategory"
                placeholder="Product Category">
	    <input
		type="file"
		id="productImage"
		accept="image/*">

            <textarea
                id="manualText"
                rows="8"
                placeholder="Enter Product Manual Here...">
            </textarea>

            <button onclick="generateQR()">
                Generate QR Code
            </button>

        </div>

        <!-- QR Output -->

        <div id="qr-code"></div>

        <button
            id="downloadBtn"
            style="display:none;">
            Download QR
        </button>

    </section>

<script src="main.js"></script>
<script src="qr-generator.js"></script>

</body>
</html>
